name: ViTest

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "lts/22"
            - name: Install dependencies
              run: |
                  cd frontend
                  npm install
            - name: Run tests
              run: |
                  cd frontend
                  npm test
