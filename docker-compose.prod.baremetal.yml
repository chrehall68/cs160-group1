# single machine deployment on bare metal
# this assumes that you already have a DNS record for the domain
# and have pointed it towards the machine running this compose file
# it also requires that processes can bind to port 80 and 443
services:
  frontend:
    build:
      context: ./web-client
      dockerfile: Dockerfile.prod.baremetal
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:? "Missing DOMAIN env var"}
      UPSTREAM_KEEPALIVE: ${UPSTREAM_KEEPALIVE:-32}
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command:
      - /bin/sh
      - -c
      - |
        /docker-entrypoint.d/20-envsubst-on-templates.sh
        ( while :; do sleep 21600 && nginx -s reload; done ) &
        exec nginx -g 'daemon off;'
    depends_on:
      database:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w
      /var/www/certbot; sleep 12h & wait $${!}; done;"
    restart: unless-stopped

  backend-init:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    working_dir: /app/src
    command: ["python", "-m", "seed"]
    environment:
      DB_USER: ${DB_USER:? "Missing DB_USER env var"}
      DB_PASSWORD: ${DB_PASSWORD:? "Missing DB_PASSWORD env var"}
      DB_LOCATION: database
      DB_NAME: postgres
      SEED_FILE: ${SEED_FILE:-/app/seeds/default.sql}
    depends_on:
      database:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command:
      [
        "fastapi",
        "run",
        "src/app.py",
        "--host",
        "0.0.0.0",
        "--workers",
        "${NUM_WORKERS:-4}",
      ]
    environment:
      DB_USER: ${DB_USER:? "Missing DB_USER env var"}
      DB_PASSWORD: ${DB_PASSWORD:? "Missing DB_PASSWORD env var"}
      DB_LOCATION: database
      DB_NAME: postgres
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:? "Missing JWT_SECRET_KEY env var"}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:? "Missing GOOGLE_API_KEY env var"}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:? "Missing PLAID_CLIENT_ID env var"}
      PLAID_SECRET: ${PLAID_SECRET:? "Missing PLAID_SECRET env var"}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:? "Missing AWS_ACCESS_KEY_ID env var"}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:? "Missing AWS_SECRET_ACCESS_KEY env var"}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:? "Missing AWS_DEFAULT_REGION env var"}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:? "Missing AWS_S3_BUCKET env var"}
    depends_on:
      database:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import urllib.request,sys; sys.exit(0 if
            urllib.request.urlopen(\"http://localhost:8000/healthz\").status ==
            200 else 1)'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    working_dir: /app/src
    command: ["python", "-m", "scheduler"]
    environment:
      DB_USER: ${DB_USER:? "Missing DB_USER env var"}
      DB_PASSWORD: ${DB_PASSWORD:? "Missing DB_PASSWORD env var"}
      DB_LOCATION: database
      DB_NAME: postgres
    depends_on:
      database:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
    restart: unless-stopped

  database:
    image: postgres:17-alpine
    command: [ "postgres", "-c", "max_connections=${POSTGRES_MAX_CONNECTIONS:-100}" ]
    environment:
      POSTGRES_USER: ${DB_USER:? "Missing DB_USER env var"}
      POSTGRES_PASSWORD: ${DB_PASSWORD:? "Missing DB_PASSWORD env var"}
      POSTGRES_DB: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"" ]
      interval: 1m
      timeout: 10s
      retries: 5
      start_period: 10s
    volumes:
      - db_volume:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db_volume:
  certbot_certs:
  certbot_www:
