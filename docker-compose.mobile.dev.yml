# separate docker compose just for the mobile dev workflow.
services:
  mobile:
    build:
      context: ./mobile-client
      dockerfile: Dockerfile.dev
    ports:
      - "8081:8081"
    volumes:
      - ./mobile-client:/app
      - /app/node_modules
    environment:
      EXPO_PUBLIC_BACKEND_URL: ${EXPO_PUBLIC_BACKEND_URL:? "Missing EXPO_PUBLIC_BACKEND_URL env var"}
    # expo's interactive CLI needs a TTY to render the QR code and accept
    # keystrokes (r to reload, m to open menu, etc.)
    stdin_open: true
    tty: true
